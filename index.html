    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useCallback } = React;

        
        const GAME_WIDTH = 1024;
        const GAME_HEIGHT = 576;
        const GROUND_Y = 516; 
        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const AIR_RESISTANCE = 0.98;

        const GOAL_WIDTH = 65;
        const GOAL_HEIGHT = 220;

        const PLAYER_RADIUS = 30;
        const PLAYER_SPEED = 1.2;
        const PLAYER_JUMP = 14;
        const PLAYER_MASS = 15;

        const BALL_RADIUS = 18;
        const BALL_MASS = 1;
        const BALL_ELASTICITY = 0.88;
        const BALL_MAX_SPEED = 28;

        const WIN_SCORE = 10;
        const GAME_DURATION = 90;

        const COLORS = {
            background: '#1a202c',
            ground: '#22543d', 
            groundLight: '#2f855a', 
            lines: 'rgba(255, 255, 255, 0.8)',
            net: 'rgba(255, 255, 255, 0.3)',
            p1: '#3182ce',
            p1Dark: '#2c5282',
            p2: '#e53e3e',
            p2Dark: '#9b2c2c',
            ball: '#ffffff',
            ballDark: '#cbd5e0'
        };

        const InputKey = {
            LEFT: 'ArrowLeft',
            RIGHT: 'ArrowRight',
            UP: 'ArrowUp',
            DOWN: 'ArrowDown',
            A: 'a',
            D: 'd',
            W: 'w',
            S: 's',
            ESCAPE: 'Escape'
        };

        
        const distance = (v1, v2) => {
            const dx = v1.x - v2.x;
            const dy = v1.y - v2.y;
            return Math.sqrt(dx * dx + dy * dy);
        };

        const dot = (v1, v2) => v1.x * v2.x + v1.y * v2.y;

        const closestPointOnSegment = (p, a, b) => {
            const ab = { x: b.x - a.x, y: b.y - a.y };
            const t = ((p.x - a.x) * ab.x + (p.y - a.y) * ab.y) / (ab.x * ab.x + ab.y * ab.y);
            const clampedT = Math.max(0, Math.min(1, t));
            return { x: a.x + ab.x * clampedT, y: a.y + ab.y * clampedT };
        };

        const resolveStaticCapsuleCollision = (entity, start, end, radius) => {
            const closest = closestPointOnSegment(entity.pos, start, end);
            const distVec = { x: entity.pos.x - closest.x, y: entity.pos.y - closest.y };
            const dist = Math.sqrt(distVec.x * distVec.x + distVec.y * distVec.y);
            const minDist = entity.radius + radius;

            if (dist < minDist && dist > 0) {
                const normal = { x: distVec.x / dist, y: distVec.y / dist };
                const overlap = minDist - dist;
                entity.pos.x += normal.x * overlap;
                entity.pos.y += normal.y * overlap;

                const velocityAlongNormal = dot(entity.vel, normal);
                if (velocityAlongNormal < 0) {
                    const restitution = entity.restitution * 0.8;
                    const j = -(1 + restitution) * velocityAlongNormal;
                    entity.vel.x += j * normal.x;
                    entity.vel.y += j * normal.y;
                    return true;
                }
            }
            return false;
        };

        const resolveCircleCollision = (e1, e2) => {
            const dist = distance(e1.pos, e2.pos);
            const minDist = e1.radius + e2.radius;

            if (dist < minDist) {
                const normal = {
                    x: (e2.pos.x - e1.pos.x) / dist,
                    y: (e2.pos.y - e1.pos.y) / dist
                };

                const overlap = minDist - dist;
                const correctionRatio = 0.5;
                e1.pos.x -= normal.x * overlap * correctionRatio;
                e1.pos.y -= normal.y * overlap * correctionRatio;
                e2.pos.x += normal.x * overlap * correctionRatio;
                e2.pos.y += normal.y * overlap * correctionRatio;

                const relativeVelocity = {
                    x: e2.vel.x - e1.vel.x,
                    y: e2.vel.y - e1.vel.y
                };

                const velocityAlongNormal = dot(relativeVelocity, normal);
                if (velocityAlongNormal > 0) return;

                const restitution = Math.min(e1.restitution, e2.restitution);
                let impulseScalar = -(1 + restitution) * velocityAlongNormal;
                impulseScalar /= (1 / e1.mass + 1 / e2.mass);
                impulseScalar *= 1.15;

                const impulse = {
                    x: impulseScalar * normal.x,
                    y: impulseScalar * normal.y
                };

                e1.vel.x -= (1 / e1.mass) * impulse.x;
                e1.vel.y -= (1 / e1.mass) * impulse.y;
                e2.vel.x += (1 / e2.mass) * impulse.x;
                e2.vel.y += (1 / e2.mass) * impulse.y;
            }
        };

        class AudioService {
            constructor() {
                this.ctx = null;
                this.enabled = false;
                this.masterVolume = 0.5;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.enabled = true;
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume().catch(() => {});
                }
            }

            setVolume(val) {
                this.masterVolume = Math.max(0, Math.min(1, val));
            }

            play(type) {
                if (!this.ctx || this.ctx.state === 'suspended') {
                    this.init();
                }
                if (!this.enabled || !this.ctx || this.masterVolume <= 0) return;

                switch (type) {
                    case 'JUMP': this.playTone(150, 'sine', 0.1, -50); break;
                    case 'KICK': this.playTone(100, 'square', 0.1, -50); this.playNoise(0.05); break;
                    case 'WALL': this.playTone(800, 'triangle', 0.05, -100); break;
                    case 'GOAL': this.playGoalSound(); break;
                    case 'WIN': this.playWinSound(); break;
                    case 'UI_SELECT': this.playTone(880, 'sine', 0.05, 0); break;
                    case 'TYPE': this.playTone(600, 'square', 0.03, 0); break;
                    case 'INTRO_END': this.playTone(300, 'sawtooth', 0.4, -200); break;
                }
            }

            playTone(freq, type, duration, slide = 0) {
                if (!this.ctx) return;
                const peakGain = 0.1 * this.masterVolume;
                if (peakGain <= 0.0001) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slide !== 0) osc.frequency.linearRampToValueAtTime(Math.max(10, freq + slide), this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(peakGain, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, peakGain * 0.1), this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            playNoise(duration) {
                if (!this.ctx) return;
                const peakGain = 0.1 * this.masterVolume;
                if (peakGain <= 0.0001) return;
                const bufferSize = this.ctx.sampleRate * duration;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(peakGain, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                noise.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            }

            playGoalSound() {
                if (!this.ctx) return;
                const peakGain = 0.1 * this.masterVolume;
                const now = this.ctx.currentTime;
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    gain.gain.setValueAtTime(peakGain, now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, peakGain * 0.1), now + i * 0.1 + 0.5);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.5);
                });
            }

            playWinSound() {
                if (!this.ctx) return;
                const peakGain = 0.1 * this.masterVolume;
                const now = this.ctx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, now + i * 0.15);
                    gain.gain.setValueAtTime(peakGain, now + i * 0.15);
                    gain.gain.linearRampToValueAtTime(0.0001, now + i * 0.15 + 0.8);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.15);
                    osc.stop(now + i * 0.15 + 0.8);
                });
            }
        }

        const audioService = new AudioService();

        class GameEngine {
            constructor() {
                this.defaultState = this.createInitialState();
                this.state = JSON.parse(JSON.stringify(this.defaultState));
                this.difficulty = 'MEDIUM';
            }

            setDifficulty(d) {
                this.difficulty = d;
            }

            createInitialState() {
                return {
                    isPlaying: false,
                    isGoal: false,
                    winner: null,
                    score: { p1: 0, p2: 0 },
                    lastScorer: 0,
                    timeLeft: GAME_DURATION,
                    player1: {
                        id: 1,
                        pos: { x: GAME_WIDTH * 0.25, y: GROUND_Y - PLAYER_RADIUS },
                        vel: { x: 0, y: 0 },
                        radius: PLAYER_RADIUS,
                        mass: PLAYER_MASS,
                        restitution: 0.5,
                        color: COLORS.p1,
                        isGrounded: false,
                        score: 0,
                        speed: PLAYER_SPEED,
                        jumpForce: PLAYER_JUMP
                    },
                    player2: {
                        id: 2,
                        pos: { x: GAME_WIDTH * 0.75, y: GROUND_Y - PLAYER_RADIUS },
                        vel: { x: 0, y: 0 },
                        radius: PLAYER_RADIUS,
                        mass: PLAYER_MASS,
                        restitution: 0.5,
                        color: COLORS.p2,
                        isGrounded: false,
                        score: 0,
                        speed: PLAYER_SPEED,
                        jumpForce: PLAYER_JUMP
                    },
                    ball: {
                        pos: { x: GAME_WIDTH / 2, y: GAME_HEIGHT / 3 },
                        vel: { x: 0, y: 0 },
                        radius: BALL_RADIUS,
                        mass: BALL_MASS,
                        restitution: BALL_ELASTICITY,
                        color: COLORS.ball
                    },
                    kickoffFrames: 60
                };
            }

            resetPositions() {
                this.state.player1.pos = { x: GAME_WIDTH * 0.25, y: GROUND_Y - PLAYER_RADIUS };
                this.state.player1.vel = { x: 0, y: 0 };
                this.state.player2.pos = { x: GAME_WIDTH * 0.75, y: GROUND_Y - PLAYER_RADIUS };
                this.state.player2.vel = { x: 0, y: 0 };
                this.state.ball.pos = { x: GAME_WIDTH / 2, y: GAME_HEIGHT / 3 };
                this.state.ball.vel = { x: 0, y: 0 };
                this.state.isGoal = false;
                this.state.lastScorer = 0;
                this.state.kickoffFrames = 60;
            }

            update(input, isTwoPlayerMode, onSound) {
                if (this.state.isGoal || this.state.winner) return;

                if (this.state.kickoffFrames > 0) this.state.kickoffFrames--;

                this.state.timeLeft -= 1 / 60;
                if (this.state.timeLeft < 0) this.state.timeLeft = 0;

                this.updatePlayer(this.state.player1, input.p1, onSound);
                
                if (isTwoPlayerMode) {
                    this.updatePlayer(this.state.player2, input.p2, onSound);
                } else {
                    this.updateAI(this.state.player2, this.state.player1, this.state.ball, onSound);
                }
                
                this.updateBall(this.state.ball, onSound);

                const v1Before = { ...this.state.player1.vel };
                const bBefore = { ...this.state.ball.vel };

                resolveCircleCollision(this.state.player1, this.state.ball);
                resolveCircleCollision(this.state.player2, this.state.ball);
                
                const kickThreshold = 1;
                if (Math.abs(this.state.ball.vel.x - bBefore.x) > kickThreshold || Math.abs(this.state.ball.vel.y - bBefore.y) > kickThreshold) {
                    onSound('KICK');
                }

                resolveCircleCollision(this.state.player1, this.state.player2);
                this.checkGoal(onSound);
            }

            updatePlayer(p, input, onSound) {
                if (input.left) p.vel.x -= p.speed;
                if (input.right) p.vel.x += p.speed;
                if (input.jump && p.isGrounded) {
                    p.vel.y = -p.jumpForce;
                    p.isGrounded = false;
                    onSound('JUMP');
                }
                this.applyPhysics(p);
                this.constrainPlayer(p);
            }

            updateAI(ai, opponent, ball, onSound) {
                let speedMult = 1;
                let aggression = 0; 
                let jumpSensitivity = 1; 
                let lookAheadFrames = 12; 
                let deadzone = 12; 
                let defenseCushion = 120; 

                if (this.difficulty === 'EASY') {
                    speedMult = 0.6; aggression = -60; jumpSensitivity = 0.3; lookAheadFrames = 0; deadzone = 60; defenseCushion = 180;
                } else if (this.difficulty === 'MEDIUM') {
                    speedMult = 0.85; aggression = -20; jumpSensitivity = 0.65; lookAheadFrames = 6; deadzone = 40; defenseCushion = 150;
                } else if (this.difficulty === 'HARD') {
                    speedMult = 1.05; aggression = 0; jumpSensitivity = 1.0; lookAheadFrames = 12; deadzone = 20; defenseCushion = 120;
                } else if (this.difficulty === 'INSANE') {
                    speedMult = 1.35; aggression = 45; jumpSensitivity = 1.3; lookAheadFrames = 20; deadzone = 5; defenseCushion = 70;
                }

                ai.speed = PLAYER_SPEED * speedMult;

                const isBallLeftOfAI = ball.pos.x < ai.pos.x;
                const ballMovingToOwnGoal = ball.vel.x > 1;
                const opponentHasPossession = distance(opponent.pos, ball.pos) < 140;

                let targetX = ball.pos.x + 40 - aggression;

                if (this.state.kickoffFrames > 0) {
                    targetX = ball.pos.x;
                    ai.speed = PLAYER_SPEED * 1.5;
                    deadzone = 2;
                } else if (ball.pos.x < GAME_WIDTH * 0.6 && (opponentHasPossession || ballMovingToOwnGoal)) {
                   targetX = ball.pos.x + defenseCushion + (ball.vel.x * 15);
                } else if (ballMovingToOwnGoal && ball.pos.x > GAME_WIDTH * 0.6) {
                   targetX = ball.pos.x + 25;
                }

                if (!ballMovingToOwnGoal && ball.pos.y < GROUND_Y - 60) {
                    targetX = ball.pos.x + (ball.vel.x * lookAheadFrames) + 30;
                }

                if (targetX > GAME_WIDTH - 25) targetX = GAME_WIDTH - 25;
                if (targetX < 0) targetX = 0;

                if (ballMovingToOwnGoal && ball.pos.x > GAME_WIDTH * 0.4) {
                     deadzone = 5; 
                }

                let moveDir = 0;
                if (Math.abs(ai.pos.x - targetX) > deadzone) {
                    moveDir = ai.pos.x < targetX ? 1 : -1;
                }

                if (!isBallLeftOfAI && ball.pos.x > ai.pos.x + 10) {
                    moveDir = 1; 
                }
                
                ai.vel.x += moveDir * ai.speed;

                if (ai.isGrounded) {
                    const dx = ai.pos.x - ball.pos.x;
                    const t = (ball.vel.x > 0.5) ? dx / ball.vel.x : 999;
                    let predY = ball.pos.y;
                    if (t > 0 && t < 40) predY = ball.pos.y + ball.vel.y * t + 0.5 * GRAVITY * t * t;

                    const jumpReach = ai.pos.y - 160; 

                    if (ball.vel.x > 4 && t > 0 && t < 30 * jumpSensitivity) {
                        if (predY < ai.pos.y - 20 && predY > jumpReach) {
                            if (Math.abs(dx) < 100 * jumpSensitivity) {
                                ai.vel.y = -ai.jumpForce;
                                ai.isGrounded = false;
                                onSound('JUMP');
                            }
                        }
                    } else if (ball.vel.x > 8 && ball.pos.y < GROUND_Y - 40 && dx > 0 && dx < 180) {
                        ai.vel.y = -ai.jumpForce;
                        ai.isGrounded = false;
                        onSound('JUMP');
                    } else if (Math.abs(dx) < 60 * jumpSensitivity && ball.pos.y < ai.pos.y - 60) {
                         if (ball.vel.y > -5) {
                            ai.vel.y = -ai.jumpForce;
                            ai.isGrounded = false;
                            onSound('JUMP');
                         }
                    } else if (distance(ai.pos, opponent.pos) < 90 && ball.pos.y < GROUND_Y - 50 && Math.abs(dx) < 70) {
                         ai.vel.y = -ai.jumpForce;
                         ai.isGrounded = false;
                         onSound('JUMP');
                    }
                }

                this.applyPhysics(ai);
                this.constrainPlayer(ai);
            }

            applyPhysics(e) {
                e.vel.y += GRAVITY;
                e.vel.x *= FRICTION;
                e.pos.x += e.vel.x;
                e.pos.y += e.vel.y;
            }

            updateBall(b, onSound) {
                b.vel.y += GRAVITY;
                b.vel.x *= AIR_RESISTANCE;

                const speed = Math.sqrt(b.vel.x * b.vel.x + b.vel.y * b.vel.y);
                if (speed > BALL_MAX_SPEED) {
                    const scale = BALL_MAX_SPEED / speed;
                    b.vel.x *= scale;
                    b.vel.y *= scale;
                }

                b.pos.x += b.vel.x;
                b.pos.y += b.vel.y;

                const goalTopY = GROUND_Y - GOAL_HEIGHT;
                if (b.pos.y - b.radius < -500) { 
                    b.pos.y = -500; 
                    b.vel.y = 0; 
                }

                if (b.pos.y + b.radius > GROUND_Y) {
                    const impact = Math.abs(b.vel.y);
                    b.pos.y = GROUND_Y - b.radius;
                    b.vel.y *= -b.restitution;
                    if (impact > 2) onSound('WALL');
                }

                const isAboveGoal = b.pos.y < goalTopY + b.radius; 
                if (isAboveGoal) {
                    if (b.pos.x - b.radius < 0) {
                        b.pos.x = b.radius;
                        b.vel.x *= -0.8;
                        onSound('WALL');
                    } else if (b.pos.x + b.radius > GAME_WIDTH) {
                        b.pos.x = GAME_WIDTH - b.radius;
                        b.vel.x *= -0.8;
                        onSound('WALL');
                    }
                } else {
                    if (b.pos.x < -100) { b.pos.x = -100; b.vel.x *= -0.5; }
                    if (b.pos.x > GAME_WIDTH + 100) { b.pos.x = GAME_WIDTH + 100; b.vel.x *= -0.5; }
                }

                const barRadius = 6; 
                const leftBarStart = { x: -50, y: goalTopY };
                const leftBarEnd = { x: GOAL_WIDTH, y: goalTopY };
                
                if (resolveStaticCapsuleCollision(b, leftBarStart, leftBarEnd, barRadius)) {
                    onSound('WALL');
                    if (b.pos.y < goalTopY) {
                        b.vel.y = Math.min(b.vel.y, -9); 
                        b.vel.x = Math.abs(b.vel.x) * 0.5 + 8;
                    }
                }

                const rightBarStart = { x: GAME_WIDTH - GOAL_WIDTH, y: goalTopY };
                const rightBarEnd = { x: GAME_WIDTH + 50, y: goalTopY };

                if (resolveStaticCapsuleCollision(b, rightBarStart, rightBarEnd, barRadius)) {
                    onSound('WALL');
                    if (b.pos.y < goalTopY) {
                        b.vel.y = Math.min(b.vel.y, -9);
                        b.vel.x = -(Math.abs(b.vel.x) * 0.5 + 8);
                    }
                }
            }

            constrainPlayer(p) {
                if (p.pos.y + p.radius > GROUND_Y) {
                    p.pos.y = GROUND_Y - p.radius;
                    p.vel.y = 0;
                    p.isGrounded = true;
                }
                if (p.pos.x - p.radius < 0) {
                    p.pos.x = p.radius;
                    p.vel.x = 0;
                }
                if (p.pos.x + p.radius > GAME_WIDTH) {
                    p.pos.x = GAME_WIDTH - p.radius;
                    p.vel.x = 0;
                }
            }

            checkGoal(onSound) {
                const goalTopY = GROUND_Y - GOAL_HEIGHT;
                if (this.state.ball.pos.y > goalTopY + this.state.ball.radius * 0.5) {
                    if (this.state.ball.pos.x < GOAL_WIDTH) {
                        this.handleGoal(2, onSound);
                    } else if (this.state.ball.pos.x > GAME_WIDTH - GOAL_WIDTH) {
                        this.handleGoal(1, onSound);
                    }
                }
            }

            handleGoal(scorerId, onSound) {
                this.state.isGoal = true;
                this.state.lastScorer = scorerId;
                if (scorerId === 1) this.state.score.p1++;
                else this.state.score.p2++;
                
                if (this.state.score.p1 >= WIN_SCORE || this.state.score.p2 >= WIN_SCORE) {
                    onSound('WIN');
                } else {
                    onSound('GOAL');
                }
            }
        }

        

        const GameCanvas = () => {
            const canvasRef = useRef(null);
            const engineRef = useRef(new GameEngine());
            const requestRef = useRef(0);
            
            const [status, setStatus] = useState('INTRO');
            const [menuState, setMenuState] = useState('MAIN');
            const [isTwoPlayer, setIsTwoPlayer] = useState(false);
            const [selectedDifficulty, setSelectedDifficulty] = useState('MEDIUM'); 
            const [score, setScore] = useState({ p1: 0, p2: 0 });
            const [timeLeft, setTimeLeft] = useState(GAME_DURATION);
            const [winner, setWinner] = useState(null);
            const [volume, setVolume] = useState(50);
            const [isExiting, setIsExiting] = useState(false);
            const [countdown, setCountdown] = useState(null);

            
            const [peerId, setPeerId] = useState('');
            const [joinId, setJoinId] = useState('');
            const [connectionStatus, setConnectionStatus] = useState('');
            const [connectionError, setConnectionError] = useState('');
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('kickItPlayerName') || '');
            const [player2Name, setPlayer2Name] = useState(() => localStorage.getItem('kickItPlayer2Name') || '');
            const [opponentName, setOpponentName] = useState('');
            const [pauseCountdown, setPauseCountdown] = useState(null);

            useEffect(() => {
                localStorage.setItem('kickItPlayerName', playerName);
            }, [playerName]);

            useEffect(() => {
                localStorage.setItem('kickItPlayer2Name', player2Name);
            }, [player2Name]);

            const peerRef = useRef(null);
            const connRef = useRef(null);
            const quickPlayPeerRef = useRef(null);
            const quickPlaySlotRef = useRef(1);
            const isHostRef = useRef(false);
            const isOnlineRef = useRef(false);
            const clientInputRef = useRef({ left: false, right: false, jump: false });
            const minimizedByMeRef = useRef(false);

            const latestScore = useRef(score);
            const latestStatus = useRef(status);
            const latestWinner = useRef(winner);
            const latestMenuState = useRef(menuState);

            useEffect(() => { latestScore.current = score; }, [score]);
            useEffect(() => { latestStatus.current = status; }, [status]);
            useEffect(() => { latestWinner.current = winner; }, [winner]);
            useEffect(() => { latestMenuState.current = menuState; }, [menuState]);

            const [introText, setIntroText] = useState("");
            const FULL_INTRO_TEXT = "CIRWILIUS";
            
            const activeKeys = useRef(new Set());
            const lastTimeRef = useRef(0);
            const accumulatorRef = useRef(0);
            const FIXED_TIME_STEP = 1 / 60;
            const MAX_FRAME_TIME = 0.25;

            useEffect(() => {
                if (status !== 'INTRO') return;
                audioService.init();

                let charIndex = 0;
                let typeInterval = null;
                let endTimeout = null;

                typeInterval = setInterval(() => {
                    if (charIndex < FULL_INTRO_TEXT.length) {
                        const capturedIndex = charIndex;
                        setIntroText(FULL_INTRO_TEXT.substring(0, capturedIndex + 1));
                        audioService.play('TYPE');
                        charIndex++;
                    } else {
                        clearInterval(typeInterval);
                        endTimeout = setTimeout(() => {
                            audioService.play('INTRO_END');
                            setStatus('MENU');
                        }, 1000);
                    }
                }, 150);

                const skipIntro = () => {
                    clearInterval(typeInterval);
                    clearTimeout(endTimeout);
                    audioService.play('INTRO_END');
                    setStatus('MENU');
                };

                window.addEventListener('keydown', skipIntro);
                window.addEventListener('click', skipIntro);
                window.addEventListener('touchstart', skipIntro);
                return () => {
                    clearInterval(typeInterval);
                    clearTimeout(endTimeout);
                    window.removeEventListener('keydown', skipIntro);
                    window.removeEventListener('click', skipIntro);
                    window.removeEventListener('touchstart', skipIntro);
                };
            }, [status]);

            useEffect(() => {
                audioService.setVolume(0.5);
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    activeKeys.current.add(e.key);
                    if (e.key === InputKey.ESCAPE) {
                        if (status === 'PLAYING') {
                            if (isOnlineRef.current && !isHostRef.current) {
                                if (connRef.current && connRef.current.open) {
                                    connRef.current.send({ type: 'PAUSE_REQUEST' });
                                }
                            } else {
                                setStatus('PAUSED');
                                if (isOnlineRef.current && isHostRef.current && connRef.current && connRef.current.open) {
                                    connRef.current.send({ type: 'PAUSE' });
                                }
                            }
                        } else if (status === 'PAUSED') {
                            if (!isOnlineRef.current) {
                                setCountdown(3);
                                setStatus('COUNTDOWN');
                            }
                        }
                    }
                };
                const handleKeyUp = (e) => activeKeys.current.delete(e.key);
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, [status]);

            useEffect(() => {
                let gpStartPrev0 = false;
                let gpStartPrev1 = false;
                const gpInterval = setInterval(() => {
                    const gp0 = readGamepad(0);
                    const gp1 = readGamepad(1);
                    const s0 = gp0.start && !gpStartPrev0;
                    const s1 = gp1.start && !gpStartPrev1;
                    gpStartPrev0 = gp0.start;
                    gpStartPrev1 = gp1.start;
                    if (s0 || s1) {
                        const cur = latestStatus.current;
                        if (cur === 'PLAYING') {
                            if (isOnlineRef.current && !isHostRef.current) {
                                if (connRef.current && connRef.current.open) connRef.current.send({ type: 'PAUSE_REQUEST' });
                            } else {
                                setStatus('PAUSED');
                                if (isOnlineRef.current && isHostRef.current && connRef.current && connRef.current.open) {
                                    connRef.current.send({ type: 'PAUSE' });
                                }
                            }
                        } else if (cur === 'PAUSED' && !isOnlineRef.current) {
                            setCountdown(3);
                            setStatus('COUNTDOWN');
                        }
                    }
                }, 100);
                return () => clearInterval(gpInterval);
            }, []);

            useEffect(() => {
                const triggerPause = () => {
                    if (latestStatus.current !== 'PLAYING') return;
                    minimizedByMeRef.current = true;
                    if (isOnlineRef.current && !isHostRef.current) {
                        if (connRef.current && connRef.current.open) connRef.current.send({ type: 'PAUSE_REQUEST' });
                    } else {
                        setStatus('PAUSED');
                        if (isOnlineRef.current && isHostRef.current && connRef.current && connRef.current.open) {
                            connRef.current.send({ type: 'PAUSE' });
                        }
                    }
                };
                const onFocus = () => { minimizedByMeRef.current = false; };
                const onVisibility = () => { if (document.hidden) triggerPause(); else minimizedByMeRef.current = false; };
                const onBlur = () => triggerPause();
                document.addEventListener('visibilitychange', onVisibility);
                window.addEventListener('blur', onBlur);
                window.addEventListener('focus', onFocus);
                return () => {
                    document.removeEventListener('visibilitychange', onVisibility);
                    window.removeEventListener('blur', onBlur);
                    window.removeEventListener('focus', onFocus);
                };
            }, []);

            useEffect(() => {
                if (status === 'COUNTDOWN' && countdown !== null) {
                    if (countdown > 0) {
                        audioService.play('UI_SELECT');
                        const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                        return () => clearTimeout(timer);
                    } else {
                        audioService.play('INTRO_END'); 
                        setStatus('PLAYING');
                        setCountdown(null);
                    }
                }
            }, [status, countdown]);

            useEffect(() => {
                if (status === 'PAUSED' && isOnlineRef.current) {
                    setPauseCountdown(15);
                } else {
                    setPauseCountdown(null);
                }
            }, [status]);

            useEffect(() => {
                if (pauseCountdown === null) return;
                if (pauseCountdown <= 0) {
                    setPauseCountdown(null);
                    if (isOnlineRef.current) {
                        if (minimizedByMeRef.current && (document.hidden || !document.hasFocus())) {
                            minimizedByMeRef.current = false;
                            if (connRef.current && connRef.current.open) {
                                connRef.current.send({ type: 'FORFEIT' });
                            }
                            if (peerRef.current) { peerRef.current.destroy(); peerRef.current = null; }
                            isOnlineRef.current = false;
                            isHostRef.current = false;
                            setStatus('MENU');
                            setMenuState('MAIN');
                            setWinner(null);
                            setCountdown(null);
                        } else if (isHostRef.current) {
                            minimizedByMeRef.current = false;
                            setCountdown(3);
                            setStatus('COUNTDOWN');
                        }
                    }
                    return;
                }
                const t = setTimeout(() => setPauseCountdown(prev => prev !== null ? prev - 1 : null), 1000);
                return () => clearTimeout(t);
            }, [pauseCountdown]);

            const readGamepad = (index) => {
                const gp = navigator.getGamepads ? navigator.getGamepads()[index] : null;
                if (!gp) return { left: false, right: false, jump: false, start: false };
                const axisX = gp.axes[0] || 0;
                const left  = axisX < -0.4 || (gp.buttons[14] && gp.buttons[14].pressed);
                const right = axisX >  0.4 || (gp.buttons[15] && gp.buttons[15].pressed);
                const jump  = (gp.buttons[0] && gp.buttons[0].pressed) || (gp.buttons[2] && gp.buttons[2].pressed) || (gp.buttons[1] && gp.buttons[1].pressed);
                const start = (gp.buttons[9] && gp.buttons[9].pressed) || (gp.buttons[7] && gp.buttons[7].pressed);
                return { left, right, jump, start };
            };

            const getInputState = (is2P) => {
                const keys = activeKeys.current;
                const isOnline = isOnlineRef.current;
                const gp0 = readGamepad(0);
                const gp1 = readGamepad(1);
                const p1Left  = keys.has(InputKey.A) || (!is2P && keys.has(InputKey.LEFT)) || (isOnline && keys.has(InputKey.LEFT)) || gp0.left;
                const p1Right = keys.has(InputKey.D) || (!is2P && keys.has(InputKey.RIGHT)) || (isOnline && keys.has(InputKey.RIGHT)) || gp0.right;
                const p1Jump  = keys.has(InputKey.W) || (!is2P && keys.has(InputKey.UP)) || (isOnline && keys.has(InputKey.UP)) || gp0.jump;
                const p2Left  = (is2P && keys.has(InputKey.LEFT)) || (is2P && gp1.left);
                const p2Right = (is2P && keys.has(InputKey.RIGHT)) || (is2P && gp1.right);
                const p2Jump  = (is2P && keys.has(InputKey.UP)) || (is2P && gp1.jump);
                return {
                    p1: { left: p1Left, right: p1Right, jump: p1Jump },
                    p2: { left: p2Left, right: p2Right, jump: p2Jump }
                };
            };

            const getClientInputState = () => {
                const keys = activeKeys.current;
                const gp0 = readGamepad(0);
                return {
                    left:  keys.has(InputKey.A) || keys.has(InputKey.LEFT)  || gp0.left,
                    right: keys.has(InputKey.D) || keys.has(InputKey.RIGHT) || gp0.right,
                    jump:  keys.has(InputKey.W) || keys.has(InputKey.UP)    || gp0.jump
                };
            };

            const drawGradientCircle = (ctx, x, y, r, colorStart, colorEnd) => {
                const grad = ctx.createRadialGradient(x - r/3, y - r/3, r/10, x, y, r);
                grad.addColorStop(0, colorStart);
                grad.addColorStop(1, colorEnd);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.beginPath();
                ctx.arc(x - r/3, y - r/3, r/4, 0, Math.PI * 2);
                ctx.fill();
            };

            const drawPlayerEyes = (ctx, x, y, r, velX) => {
                const lookDir = velX >= 0 ? 1 : -1;
                const eyeOffsetX = r * 0.4 * lookDir;
                const eyeOffsetY = -r * 0.2;
                const eyeSize = r * 0.25;

                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(x + eyeOffsetX, y + eyeOffsetY, eyeSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(x + eyeOffsetX + (lookDir * 2), y + eyeOffsetY, eyeSize * 0.4, 0, Math.PI * 2);
                ctx.fill();
            };

            const drawNet = (ctx, x, y, w, h, isRight) => {
                ctx.save();
                ctx.strokeStyle = COLORS.net;
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                const backX = isRight ? x + w : x;
                const frontX = isRight ? x : x + w;

                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(frontX, y);
                ctx.lineTo(frontX, y + h); 
                ctx.moveTo(frontX, y); 
                ctx.lineTo(backX, y); 
                ctx.stroke();

                ctx.strokeStyle = COLORS.net;
                ctx.lineWidth = 1;
                ctx.beginPath();
                const step = 12;
                
                for(let i = y; i <= y + h; i += step) {
                ctx.moveTo(x, i);
                ctx.lineTo(x + w, i);
                }
                for(let i = x; i <= x + w; i += step) {
                ctx.moveTo(i, y);
                ctx.lineTo(i, y + h);
                }
                ctx.stroke();
                ctx.restore();
            };

            const draw = (ctx, engine) => {
                const bgGradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
                bgGradient.addColorStop(0, "#1a202c");
                bgGradient.addColorStop(1, "#2d3748");
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                const numStripes = 10;
                const stripeWidth = GAME_WIDTH / numStripes;
                for (let i = 0; i < numStripes; i++) {
                    ctx.fillStyle = i % 2 === 0 ? COLORS.ground : COLORS.groundLight;
                    ctx.fillRect(i * stripeWidth, GROUND_Y, stripeWidth, GAME_HEIGHT - GROUND_Y);
                }

                ctx.shadowBlur = 10;
                ctx.shadowColor = "white";
                ctx.strokeStyle = COLORS.lines;
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.moveTo(GAME_WIDTH / 2, GROUND_Y);
                ctx.lineTo(GAME_WIDTH / 2, GAME_HEIGHT);
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(GAME_WIDTH / 2, GROUND_Y, 100, 0, Math.PI, false);
                ctx.stroke();
                
                ctx.shadowBlur = 0;

                drawNet(ctx, 0, GROUND_Y - GOAL_HEIGHT, GOAL_WIDTH, GOAL_HEIGHT, false);
                drawNet(ctx, GAME_WIDTH - GOAL_WIDTH, GROUND_Y - GOAL_HEIGHT, GOAL_WIDTH, GOAL_HEIGHT, true);

                const { player1, player2, ball } = engine.state;

                ctx.fillStyle = "rgba(0,0,0,0.3)";
                const drawShadow = (x, y, r) => {
                    const height = Math.max(0, GROUND_Y - (y + r)); 
                    const scale = Math.max(0.5, 1 - height / 300);
                    ctx.beginPath();
                    ctx.ellipse(x, GROUND_Y, r * scale, r * 0.3 * scale, 0, 0, Math.PI * 2);
                    ctx.fill();
                };
                drawShadow(player1.pos.x, player1.pos.y, player1.radius);
                drawShadow(player2.pos.x, player2.pos.y, player2.radius);
                drawShadow(ball.pos.x, ball.pos.y, ball.radius);

                drawGradientCircle(ctx, player1.pos.x, player1.pos.y, player1.radius, COLORS.p1, COLORS.p1Dark);
                drawPlayerEyes(ctx, player1.pos.x, player1.pos.y, player1.radius, player1.vel.x);
                
                drawGradientCircle(ctx, player2.pos.x, player2.pos.y, player2.radius, COLORS.p2, COLORS.p2Dark);
                drawPlayerEyes(ctx, player2.pos.x, player2.pos.y, player2.radius, player2.vel.x);

                drawGradientCircle(ctx, ball.pos.x, ball.pos.y, ball.radius, COLORS.ball, COLORS.ballDark);
                ctx.strokeStyle = "#cbd5e0";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(ball.pos.x, ball.pos.y, ball.radius * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                const p1Name = isOnlineRef.current ? (isHostRef.current ? playerName : (opponentName || "P1")) : (playerName || "P1");
                const p2Name = isOnlineRef.current ? (isHostRef.current ? (opponentName || "P2") : playerName) : (isTwoPlayer ? (player2Name || "P2") : "CPU");

                ctx.fillStyle = "white";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(p1Name.toUpperCase(), player1.pos.x, player1.pos.y - player1.radius - 15);
                ctx.fillText(p2Name.toUpperCase(), player2.pos.x, player2.pos.y - player2.radius - 15);
            };

            const gameLoop = useCallback((time) => {
                let frameTime = (time - lastTimeRef.current) / 1000;
                lastTimeRef.current = time;
                if (frameTime > MAX_FRAME_TIME) frameTime = MAX_FRAME_TIME;

                const engine = engineRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas?.getContext('2d');

                if (status === 'PLAYING') {
                    accumulatorRef.current += frameTime;
                    while (accumulatorRef.current >= FIXED_TIME_STEP) {
                        if (!winner) {
                            if (!isOnlineRef.current || isHostRef.current) {
                                const inputs = getInputState(isTwoPlayer);
                                if (isOnlineRef.current && isHostRef.current) {
                                    inputs.p2 = clientInputRef.current;
                                }

                                engine.update(inputs, isTwoPlayer, (type) => {
                                    audioService.play(type);
                                    if (isOnlineRef.current && isHostRef.current && connRef.current) {
                                        connRef.current.send({ type: 'SOUND', sound: type });
                                    }
                                });
                                
                                if (engine.state.isGoal && !engine.state.winner) {
                                    if (score.p1 !== engine.state.score.p1 || score.p2 !== engine.state.score.p2) {
                                        setScore({ ...engine.state.score });
                                    }

                                    if (engine.state.score.p1 >= WIN_SCORE) {
                                        setWinner('Player 1 Wins!');
                                        setStatus('ENDED');
                                        audioService.play('WIN');
                                    } else if (engine.state.score.p2 >= WIN_SCORE) {
                                        setWinner(isTwoPlayer ? 'Player 2 Wins!' : 'Computer Wins!');
                                        setStatus('ENDED');
                                        audioService.play('WIN');
                                    } else {
                                        if (!engineRef.current['resetPending']) {
                                            engineRef.current['resetPending'] = true;
                                            setTimeout(() => {
                                                engine.resetPositions();
                                                engineRef.current['resetPending'] = false;
                                                setScore({...engine.state.score}); 
                                            }, 1500);
                                        }
                                    }
                                }

                                if (engine.state.timeLeft <= 0 && !engine.state.isGoal) {
                                    if (engine.state.score.p1 > engine.state.score.p2) {
                                        setWinner('Player 1 Wins!');
                                    } else if (engine.state.score.p2 > engine.state.score.p1) {
                                        setWinner(isTwoPlayer ? 'Player 2 Wins!' : 'Computer Wins!');
                                    } else {
                                        setWinner('Draw!');
                                    }
                                    setStatus('ENDED');
                                    audioService.play('WIN');
                                }
                            } else {
                                
                                const clientInput = getClientInputState();
                                if (connRef.current && connRef.current.open) {
                                    connRef.current.send({ type: 'INPUT', input: clientInput });
                                }
                            }
                        }
                        accumulatorRef.current -= FIXED_TIME_STEP;
                    }
                }

                if (ctx) draw(ctx, engine);

                if (!isOnlineRef.current || isHostRef.current) {
                    const engineTime = Math.ceil(engine.state.timeLeft);
                    setTimeLeft(prev => prev !== engineTime ? engineTime : prev);

                    if (isOnlineRef.current && isHostRef.current && connRef.current && connRef.current.open) {
                        connRef.current.send({
                            type: 'STATE',
                            state: engine.state,
                            score: latestScore.current,
                            status: latestStatus.current,
                            winner: latestWinner.current
                        });
                    }
                }

                requestRef.current = requestAnimationFrame(gameLoop);
            }, [status, isTwoPlayer, winner, score]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(gameLoop);
                return () => {
                    if (requestRef.current) cancelAnimationFrame(requestRef.current);
                };
            }, [gameLoop]);

            const playUiSound = () => {
                audioService.init();
                audioService.play('UI_SELECT');
            };

            const handleVolumeChange = (e) => {
                const val = parseInt(e.target.value);
                setVolume(val);
                audioService.setVolume(val / 100);
                if (Math.random() > 0.8) audioService.play('UI_SELECT'); 
            };

            const startGame = (mode2P, difficulty = 'MEDIUM', online = false) => {
                playUiSound();
                setIsTwoPlayer(mode2P);
                setSelectedDifficulty(difficulty);
                isOnlineRef.current = online;
                
                engineRef.current = new GameEngine();
                engineRef.current.setDifficulty(difficulty);
                
                setScore({ p1: 0, p2: 0 });
                setTimeLeft(GAME_DURATION);
                setWinner(null);
                setMenuState('MAIN');
                
                setCountdown(3);
                setStatus('COUNTDOWN');
            };

            const setupConnection = (conn, isHost) => {
                let opponentLeaving = false;

                const initConn = () => {
                    isHostRef.current = isHost;
                    isOnlineRef.current = true;
                    conn.send({ type: 'SET_NAME', name: playerName.trim() || 'Player' });
                    
                    if (isHost) {
                        startGame(true, 'MEDIUM', true);
                        conn.send({ type: 'START' });
                    } else {
                        setConnectionStatus('Connected! Waiting for host to start...');
                    }
                };

                if (conn.open) {
                    initConn();
                } else {
                    conn.on('open', initConn);
                }

                conn.on('data', (data) => {
                    if (data.type === 'REJECTED') {
                        if (latestMenuState.current === 'QUICK_PLAYING') {
                            if (quickPlayPeerRef.current) quickPlayPeerRef.current.destroy();
                            searchSlot(quickPlaySlotRef.current + 1);
                        } else {
                            setConnectionError('Host is busy.');
                            cancelJoin();
                        }
                        return;
                    }
                    if (data.type === 'SET_NAME') {
                        setOpponentName(data.name);
                        return;
                    }
                    if (data.type === 'LEAVING') {
                        opponentLeaving = true;
                        return;
                    }
                    if (isHost) {
                        if (data.type === 'INPUT') {
                            clientInputRef.current = data.input;
                        } else if (data.type === 'PAUSE_REQUEST') {
                            if (latestStatus.current === 'PLAYING') {
                                setStatus('PAUSED');
                            }
                        } else if (data.type === 'RESUME_REQUEST') {
                            if (latestStatus.current === 'PAUSED') {
                                setCountdown(3);
                                setStatus('COUNTDOWN');
                            }
                        } else if (data.type === 'FORFEIT') {
                            setConnectionError('Your opponent forfeited the match.');
                            setTimeout(() => {
                                setConnectionError('');
                                setStatus('MENU');
                                setMenuState('MAIN');
                                setWinner(null);
                                setCountdown(null);
                                isOnlineRef.current = false;
                                isHostRef.current = false;
                                if (peerRef.current) { peerRef.current.destroy(); peerRef.current = null; }
                            }, 3000);
                        }
                    } else {
                        if (data.type === 'PAUSE') {
                            setStatus('PAUSED');
                        } else if (data.type === 'START') {
                            startGame(true, 'MEDIUM', true);
                        } else if (data.type === 'STATE') {
                            engineRef.current.state = data.state;
                            if (latestScore.current.p1 !== data.score.p1 || latestScore.current.p2 !== data.score.p2) {
                                setScore(data.score);
                            }
                            if (latestStatus.current !== data.status) {
                                
                                if (!(latestStatus.current === 'PAUSED' && data.status === 'PLAYING')) {
                                    setStatus(data.status);
                                    if (data.status === 'COUNTDOWN') {
                                        setCountdown(3);
                                    }
                                }
                            }
                            if (latestWinner.current !== data.winner) {
                                setWinner(data.winner);
                            }
                            setTimeLeft(Math.ceil(data.state.timeLeft));
                        } else if (data.type === 'SOUND') {
                            audioService.play(data.sound);
                        }
                    }
                });

                conn.on('close', () => {
                    if (opponentLeaving) return;
                    const wasPlaying = latestStatus.current === 'PLAYING' || latestStatus.current === 'PAUSED' || latestStatus.current === 'COUNTDOWN';
                    setConnectionError(wasPlaying ? 'Your opponent left the match.' : 'Connection lost');
                    setTimeout(() => {
                        setConnectionError('');
                        setStatus('MENU');
                        setMenuState('MAIN');
                        setWinner(null);
                        setCountdown(null);
                        isOnlineRef.current = false;
                        isHostRef.current = false;
                    }, 3000);
                });

                conn.on('error', (err) => {
                    setConnectionError('Connection error: ' + err.type);
                    setTimeout(() => {
                        quitToMenu();
                        setConnectionError('');
                    }, 2000);
                });
            };

            const peerConfig = {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            };

            const hostOnlineGame = () => {
                playUiSound();
                if (!playerName.trim()) setPlayerName('Player');
                setMenuState('HOSTING');
                setConnectionStatus('Creating peer...');
                const peer = new Peer(peerConfig);
                peerRef.current = peer;
                
                peer.on('open', (id) => {
                    setPeerId(id);
                    setConnectionStatus('Waiting for opponent...');
                });

                peer.on('connection', (conn) => {

                            setTimeout(() => conn.close(), 500);

                        else conn.on('open', reject);
                        return;

                    setConnectionStatus('Opponent connected!');
                    connRef.current = conn;
                    setupConnection(conn, true);

                    setConnectionError('Error: ' + (err.type || err.message || 'Unknown error'));
                });

            const joinOnlineGame = () => {
                playUiSound();
                if (!playerName.trim()) setPlayerName('Player');
                if (!joinId) return;
                setConnectionStatus('Connecting...');
                const peer = new Peer(peerConfig);
                peerRef.current = peer;
                
                peer.on('open', () => {
                    const conn = peer.connect(joinId);
                    connRef.current = conn;
                    setupConnection(conn, false);
                });

                    setConnectionError('Error: ' + (err.type || err.message || 'Unknown error'));
                });

            const cancelHost = () => {
                playUiSound();
                if (peerRef.current) {
                    peerRef.current.destroy();
                    peerRef.current = null;
                }

                setConnectionStatus('');

                const peer = new Peer(peerConfig);
                quickPlayPeerRef.current = peer;
                peerRef.current = peer;
                isHostRef.current = false;

                peer.on('open', () => {
                    const conn = peer.connect(`kick-it-quick-${slot}`);
                    
                    conn.on('open', () => {
                        connRef.current = conn;
                        setupConnection(conn, false);
                    });

                    conn.on('error', () => {
                        peer.destroy();
                        searchSlot(slot + 1);
                    });
                });

                peer.on('error', (err) => {
                    if (err.type === 'peer-unavailable') {
                        peer.destroy();
                        hostSlot(slot);
                    } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'browser-incompatible') {
                        peer.destroy();
                        setConnectionError('Error: ' + (err.type || err.message || 'Unknown error'));
                        cancelQuickPlay();
                    } else {
                        peer.destroy();
                        searchSlot(slot + 1);
                    }
                });

            const hostSlot = (slot) => {

                });

                            conn.send({ type: 'REJECTED' });
                            setTimeout(() => conn.close(), 500);

                        if (conn.open) reject();
                        else conn.on('open', reject);
                        return;
                    }
                    
                    setConnectionStatus('Opponent found!');
                    connRef.current = conn;
                    setupConnection(conn, true);

                    <h2 className="text-6xl sm:text-8xl font-black text-white mb-2 tracking-tighter italic" style={{textShadow: "4px 4px 0px #d69e2e"}}>MATCH ENDED</h2>
                    <div className="text-5xl sm:text-6xl font-black text-white mb-12 tracking-wide drop-shadow-xl animate-bounce">
                        {winner === 'Draw!' ? (
                            <span className="text-gray-300">DRAW GAME!</span>
                        ) : (
                            <span className={winner.includes('Player 1') ? 'text-blue-400' : 'text-red-400'}>
                                {isOnlineRef.current ? 
                                    (winner.includes('Player 1') ? (isHostRef.current ? playerName : (opponentName || "Player 1")) : (isHostRef.current ? (opponentName || "Player 2") : playerName)) + " WINS!"
                                    : winner}
                            </span>
                        )}
                    </div>
                    <div className="flex gap-12 items-center bg-slate-800/50 p-8 rounded-2xl border border-slate-700 mb-16 backdrop-blur-sm">
                        <div className="flex flex-col items-center">
                            <span className="text-blue-400 font-bold text-2xl mb-2 uppercase">{isOnlineRef.current ? (isHostRef.current ? playerName : (opponentName || "Player 1")) : "PLAYER 1"}</span>
                            <span className="text-7xl font-black text-white">{score.p1}</span>
                        </div>
                        <div className="text-slate-500 text-5xl font-thin">vs</div>
                        <div className="flex flex-col items-center">
                            <span className="text-red-400 font-bold text-2xl mb-2 uppercase">{isOnlineRef.current ? (isHostRef.current ? (opponentName || "Player 2") : playerName) : (isTwoPlayer ? "PLAYER 2" : "CPU")}</span>
                            <span className="text-7xl font-black text-white">{score.p2}</span>
                        </div>
                    </div>
                    <div className="flex flex-col gap-5 w-72">
                        {(!isOnlineRef.current || isHostRef.current) && (
                            <button onClick={restartGame} className="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform hover:scale-105 transition border-b-4 border-yellow-800 text-xl">Rematch</button>
                        )}
                        <button onClick={quitToMenu} className="bg-slate-600 hover:bg-slate-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform hover:scale-105 transition border-b-4 border-slate-800 text-xl">Main Menu</button>
                    </div>
                    </div>
                )}

                {connectionError && (
                    <div className="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[200] animate-in fade-in duration-300">
                        <h2 className="text-4xl sm:text-5xl font-black text-red-500 mb-6 tracking-tighter italic uppercase" style={{textShadow: "4px 4px 0px #742a2a"}}>
                            {connectionError.includes('left') ? 'OPPONENT LEFT' : 'CONNECTION ERROR'}
                        </h2>
                        <p className="text-white font-black text-xl uppercase tracking-widest mb-12">{connectionError.includes('left') ? 'Your opponent abandoned the match.' : connectionError}</p>
                        <button onClick={() => setConnectionError('')} className="bg-slate-600 hover:bg-slate-500 text-white font-bold py-4 px-8 rounded-xl shadow-xl transform hover:scale-105 transition border-b-4 border-slate-800 text-lg uppercase tracking-wider">Dismiss</button>
                    </div>
                )}
                </div>
            );
        };

        const App = () => {
            return (
                <div className="w-full h-full">
                    <GameCanvas />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
